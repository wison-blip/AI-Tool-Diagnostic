<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Kaku Gothic ProN','ヒラギノ角ゴ ProN','Yu Gothic',Meiryo,sans-serif;background:linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 60px}
.container{max-width:680px;width:100%}
.card{background:#fff;border-radius:28px;padding:40px 36px;box-shadow:0 32px 80px rgba(0,0,0,.22);animation:fadeUp .45s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.start-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-size:11px;font-weight:700;letter-spacing:.1em;padding:6px 16px;border-radius:999px;margin-bottom:20px}
.start-title{font-size:26px;font-weight:900;color:#1a1a2e;line-height:1.35;margin-bottom:12px}
.start-title span{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.start-sub{font-size:14px;color:#6b7280;line-height:1.75;margin-bottom:22px;text-align:left}
.target-box{background:linear-gradient(135deg,#f5f3ff,#fdf4ff);border-left:4px solid #a855f7;border-radius:0 14px 14px 0;padding:14px 18px;margin-bottom:24px;font-size:13px;color:#4b5563;line-height:1.65;text-align:left}
.target-box strong{color:#1a1a2e}
.tool-icons{display:flex;justify-content:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:28px}
.tool-icon-chip{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700;color:#374151;transition:all .2s}
.tool-icon-chip:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.meta-row{display:flex;gap:10px;margin-bottom:32px}
.meta-item{flex:1;background:#f9fafb;border-radius:14px;padding:14px;text-align:center}
.meta-num{font-size:24px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.meta-lbl{font-size:11px;color:#9ca3af;margin-top:3px}
.btn-start{width:100%;padding:20px;font-size:17px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;cursor:pointer;font-weight:900;transition:transform .15s,box-shadow .15s;letter-spacing:.04em}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(99,102,241,.45)}
.free-note{font-size:11px;color:#9ca3af;text-align:center;margin-top:12px}
/* progress */
.progress-wrap{margin-bottom:24px}
.progress-track{height:6px;background:#f3f4f6;border-radius:999px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#a855f7);transition:width .4s cubic-bezier(.22,1,.36,1)}
.progress-label{font-size:11px;color:#9ca3af;text-align:right}
/* question */
.q-label{font-size:11px;font-weight:700;color:#a855f7;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:20px;font-weight:800;color:#1a1a2e;line-height:1.5;margin-bottom:22px}
.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
@media(min-width:480px){.choices.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}}
.choices.two-col .choice{height:100%;align-items:flex-start}
.q1-hint{font-size:12px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 14px;margin-bottom:10px;text-align:center;line-height:1.6}
.choice{display:flex;align-items:center;gap:14px;padding:16px 18px;border:2.5px solid #e5e7eb;border-radius:16px;cursor:pointer;transition:all .2s;user-select:none;position:relative;overflow:hidden}
.choice::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#f5f3ff,#fdf4ff);opacity:0;transition:opacity .2s}
.choice:hover{border-color:#c4b5fd;transform:translateX(3px)}
.choice:hover::before{opacity:1}
.choice.selected{border-color:#8b5cf6;transform:translateX(3px)}
.choice.selected::before{opacity:1}
.choice-icon{font-size:22px;flex-shrink:0;width:30px;text-align:center;position:relative;z-index:1}
.choice-text{font-size:14px;color:#374151;line-height:1.45;flex:1;position:relative;z-index:1}
.choice-dot{width:22px;height:22px;border-radius:5px;border:2.5px solid #d1d5db;flex-shrink:0;position:relative;z-index:1;transition:all .2s}
.choice.selected .choice-dot{border-color:#8b5cf6;background:#8b5cf6}
.choice.selected .choice-dot::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:14px;font-weight:900;line-height:1}
/* 1択モード：ラジオボタン風 */
.choices.single-mode .choice-dot{border-radius:50%}
.choices.single-mode .choice.selected .choice-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.select-counter{font-size:12px;color:#6b7280;text-align:right;margin:-6px 0 10px;min-height:18px}
.select-counter strong{color:#8b5cf6}
/* nav */
.nav{display:flex;gap:10px}
.btn{flex:1;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.4)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-back{background:#f3f4f6;color:#6b7280}
.btn-back:hover{background:#e5e7eb}
/* result hero */
.result-hero{text-align:center;padding:30px 20px 24px;border-radius:22px;margin-bottom:24px;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(ellipse at center,rgba(255,255,255,.15),transparent 70%);pointer-events:none}
.result-emoji{display:flex;justify-content:center;margin-bottom:12px;animation:pop .5s cubic-bezier(.36,.07,.19,.97)}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.result-caption{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.result-type{font-size:25px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.result-tool-badge{display:inline-block;background:rgba(255,255,255,.25);color:#fff;font-size:14px;font-weight:700;padding:7px 20px;border-radius:999px;backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.4)}
.compat-score{margin-top:12px;font-size:13px;color:rgba(255,255,255,.85)}
.compat-num{font-size:22px;font-weight:900;color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.tag{background:#f5f3ff;color:#6d28d9;font-size:12px;font-weight:700;padding:5px 13px;border-radius:999px;border:1.5px solid #ddd6fe}
/* score bars */
.score-section{margin-bottom:26px}
.score-title{font-size:14px;font-weight:800;color:#1a1a2e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.score-rank{width:22px;height:22px;border-radius:50%;background:#f3f4f6;font-size:11px;font-weight:800;color:#6b7280;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.score-rank.first{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.score-emoji{flex-shrink:0;width:26px;display:flex;align-items:center}
.score-name{font-size:12px;font-weight:700;color:#374151;width:96px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-bar-wrap{flex:1;height:10px;background:#f3f4f6;border-radius:999px;overflow:hidden}
.score-bar{height:100%;border-radius:999px;width:0}
@keyframes barGrow{to{width:var(--w)}}
.score-pct{font-size:12px;font-weight:700;color:#6b7280;width:36px;text-align:right;flex-shrink:0}
/* desc */
.desc-box{background:#f9fafb;border-radius:16px;padding:20px;margin-bottom:24px;font-size:14px;color:#4b5563;line-height:1.8}
/* plans */
.plans-section{margin-bottom:26px}
.plans-title{font-size:15px;font-weight:900;color:#1a1a2e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.plan-card{border:2px solid #e5e7eb;border-radius:16px;padding:16px;transition:border-color .2s}
.plan-card.hl{border-color:var(--pc,#6366f1)}
.plan-badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 10px;border-radius:999px;margin-bottom:8px;white-space:nowrap}
.plan-name{font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:4px;line-height:1.35}
.plan-price{font-size:12px;font-weight:700;color:#6b7280;margin-bottom:10px;line-height:1.4}
.plan-feats{list-style:none;margin-bottom:10px}
.plan-feats li{font-size:12px;color:#374151;padding:2px 0;display:flex;align-items:flex-start;gap:5px;line-height:1.4}
.plan-check{flex-shrink:0;margin-top:1px;font-size:11px;font-weight:800}
.plan-forWho{font-size:11px;color:#9ca3af;border-top:1px solid #f3f4f6;padding-top:8px;line-height:1.45}
/* prompts */
.prompts-section{margin-bottom:26px}
.prompts-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:14px;cursor:pointer;font-size:14px;font-weight:800;color:#1a1a2e;border:2px solid #e5e7eb;transition:border-color .2s;user-select:none}
.prompts-header:hover{border-color:#c4b5fd}
.prompts-toggle{font-size:16px;color:#9ca3af;transition:transform .3s}
.prompts-toggle.open{transform:rotate(180deg)}
.prompts-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.22,1,.36,1)}
.prompts-body.open{max-height:2400px}
.prompts-grid{display:flex;flex-direction:column;gap:10px;padding-top:12px}
.prompt-card{border:1.5px solid #e5e7eb;border-radius:14px;padding:14px}
.prompt-label{font-size:11px;font-weight:800;margin-bottom:8px}
.prompt-text{font-size:12px;color:#374151;line-height:1.65;background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:10px;word-break:break-word}
.prompt-copy{font-size:11px;font-weight:700;padding:5px 14px;border-radius:8px;cursor:pointer;background:transparent;border:1.5px solid;transition:all .2s}
.prompt-copy:hover{opacity:.8}
/* steps */
.steps-title{font-size:16px;font-weight:900;color:#1a1a2e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.step{display:flex;align-items:flex-start;gap:14px;padding:16px;border-radius:16px;margin-bottom:10px}
.step-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.step-body{flex:1}
.step-when{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.step-text{font-size:14px;color:#374151;line-height:1.55}
/* combo */
.combo-box{background:linear-gradient(135deg,#fef9c3,#fefce8);border:2px solid #fde68a;border-radius:16px;padding:18px 20px;margin-bottom:24px}
.combo-title{font-size:14px;font-weight:800;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.combo-text{font-size:13px;color:#78350f;line-height:1.65}
/* CTA */
.cta-link{display:block;text-align:center;padding:17px;border-radius:16px;font-size:15px;font-weight:800;text-decoration:none;color:#fff;margin:24px 0 10px;transition:all .2s;letter-spacing:.03em}
.cta-link:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.2)}
.btn-restart{width:100%;padding:14px;background:#f3f4f6;color:#6b7280;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-restart:hover{background:#e5e7eb}
/* export */
.export-row{display:flex;gap:10px;margin-top:10px}
.btn-export{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border:2px solid #e5e7eb;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#374151;transition:all .2s}
.btn-export:hover{border-color:#8b5cf6;color:#6d28d9;background:#f5f3ff;transform:translateY(-1px)}
/* runners */
.runners-title{font-size:15px;font-weight:900;color:#1a1a2e;margin:28px 0 6px;display:flex;align-items:center;gap:8px}
.runners-note{font-size:12px;color:#9ca3af;margin-bottom:14px}
.runner-card{border:2px solid #e5e7eb;border-radius:18px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.runner-card:hover{border-color:#c4b5fd}
.runner-header{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
.runner-rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.runner-emoji{flex-shrink:0}
.runner-info{flex:1}
.runner-name{font-size:14px;font-weight:800;color:#1a1a2e}
.runner-pitch{font-size:12px;color:#6b7280;margin-top:2px}
.runner-toggle{font-size:18px;color:#9ca3af;transition:transform .3s;flex-shrink:0}
.runner-toggle.open{transform:rotate(180deg)}
.runner-detail{max-height:0;overflow:hidden;transition:max-height .6s cubic-bezier(.22,1,.36,1)}
.runner-detail.open{max-height:2400px}
.runner-inner{padding:0 18px 18px}
.runner-desc{font-size:13px;color:#4b5563;line-height:1.7;background:#f9fafb;border-radius:12px;padding:14px;margin-bottom:14px}
.runner-plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.runner-plan{border:2px solid #e5e7eb;border-radius:12px;padding:12px;font-size:12px}
.runner-plan.hl{border-color:var(--rpc,#6366f1)}
.runner-plan-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:6px}
.runner-plan-name{font-weight:800;color:#1a1a2e;margin-bottom:3px}
.runner-plan-price{color:#6b7280;margin-bottom:8px;line-height:1.4}
.runner-plan-feats{list-style:none}
.runner-plan-feats li{color:#374151;padding:2px 0;display:flex;align-items:flex-start;gap:4px;line-height:1.35}
/* runner prompts */
.runner-prompts-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:12px;cursor:pointer;font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:10px;user-select:none}
.runner-prompts-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.22,1,.36,1)}
.runner-prompts-body.open{max-height:1600px}
.runner-prompts-list{display:flex;flex-direction:column;gap:8px;padding-bottom:4px}
.runner-prompt-item{border:1.5px solid #f3f4f6;border-radius:10px;padding:10px}
.runner-prompt-label{font-size:10px;font-weight:800;margin-bottom:4px}
.runner-prompt-text{font-size:11px;color:#4b5563;line-height:1.6;word-break:break-word}
/* runner steps */
.runner-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.runner-step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.runner-step-body{flex:1}
.runner-step-when{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.runner-step-text{font-size:13px;color:#374151;line-height:1.5}
.runner-cta{display:block;text-align:center;padding:13px;border-radius:12px;font-size:13px;font-weight:800;text-decoration:none;color:#fff;margin-top:14px;transition:all .2s}
.runner-cta:hover{transform:translateY(-1px);opacity:.9}
/* insight box */
.insight-box{border-left:4px solid #6366f1;border-radius:0 14px 14px 0;padding:16px 20px;margin:0 0 24px;line-height:1.75}
.insight-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.insight-text{font-size:15px;color:#1e293b}
.insight-why{font-size:13px;color:#64748b;line-height:1.75;display:block;margin-top:7px}
.match-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:800;margin-top:10px;color:#fff;opacity:.92}
/* loading screen */
.loading-card{text-align:center;padding:60px 36px}
.loading-icon{font-size:72px;display:block;margin-bottom:24px;animation:spin 2s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.loading-title{font-size:20px;font-weight:800;color:#1a1a2e;line-height:1.5;margin-bottom:28px}
.loading-progress{height:8px;background:#f3f4f6;border-radius:999px;overflow:hidden;margin-bottom:24px}
.loading-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);animation:loadFill 1.5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes loadFill{from{width:0}to{width:100%}}
.loading-tools{display:flex;justify-content:center;gap:12px;font-size:24px;opacity:.35;margin-bottom:14px}
.loading-sub{font-size:13px;color:#9ca3af}

.featured-prompt{border:2.5px solid #6366f1;border-radius:18px;padding:18px 20px;margin:0 0 24px}
.featured-prompt-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.featured-prompt-tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;color:#fff;margin-bottom:10px}
.featured-prompt-text{font-size:13px;color:#374151;line-height:1.75;word-break:break-word;background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:10px}

.sample-toggle:hover{opacity:.8}
.sample-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,1,.36,1)}
.sample-body.open{max-height:600px}
.sample-output{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:12px;margin-top:10px;font-size:12px;color:#166534;line-height:1.75;white-space:pre-wrap;word-break:break-all}
.sample-label{font-size:10px;font-weight:800;color:#16a34a;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
/* next-step */
.nextstep-box{border:2px dashed #e5e7eb;border-radius:18px;padding:18px 20px;margin:0 0 20px}
.nextstep-title{font-size:12px;font-weight:800;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.nextstep-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.nextstep-item:last-child{margin-bottom:0}
.nextstep-emoji{flex-shrink:0;line-height:1;display:flex;align-items:center}
.nextstep-item-title{font-size:14px;font-weight:800;color:#1a1a2e;margin-bottom:3px}
.nextstep-item-desc{font-size:12px;color:#6b7280;line-height:1.6}
/* detail accordion */
.btn-detail{width:100%;background:#f9fafb;border:2px dashed #d1d5db;border-radius:14px;padding:14px 18px;font-size:13px;font-weight:700;color:#6b7280;cursor:pointer;margin:20px 0 0;transition:background .2s;text-align:center}
.btn-detail:hover{background:#f3f4f6;color:#374151}
.detail-section{overflow:hidden;max-height:0;transition:max-height .45s ease}
.detail-section.open{max-height:12000px}
/* share */
.share-row{margin:20px 0;padding:18px 0 0;border-top:2px dashed #e5e7eb;text-align:center}
.share-label{font-size:11px;font-weight:800;color:#9ca3af;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.share-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn-share{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-share:hover{transform:translateY(-2px);opacity:.88}
.btn-share-x{background:#000;color:#fff}
.btn-share-line{background:#06C755;color:#fff}
.btn-share-copy{background:#f3f4f6;color:#374151}
/* over-budget plan */
.plan-card.over-budget{opacity:.45;position:relative}
.over-budget-label{font-size:11px;color:#9ca3af;margin-top:6px;padding-top:6px;border-top:1px solid #f3f4f6;text-align:center}
/* upsell box */
.upsell-box{background:linear-gradient(135deg,#fefce8,#fffbeb);border:2px solid #fcd34d;border-radius:16px;padding:16px 18px;margin:0 0 24px}
.upsell-title{font-size:13px;font-weight:800;color:#92400e;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.upsell-plan-name{font-size:14px;font-weight:800;margin-bottom:3px}
.upsell-price-text{font-size:12px;color:#6b7280;margin-bottom:8px;line-height:1.5}
.upsell-feats{list-style:none;margin-bottom:8px}
.upsell-feats li{font-size:12px;color:#374151;padding:2px 0;display:flex;align-items:flex-start;gap:5px}
.upsell-for-who{font-size:11px;color:#92400e;font-weight:700}
/* print */
@media print{
  body{background:white!important;padding:0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .container{max-width:100%!important}
  .card{box-shadow:none!important;border-radius:0!important;padding:16px!important;animation:none!important}
  .btn-restart,.export-row,.runners-title,.runners-note,.runner-card,.combo-box,.prompts-section{display:none!important}
  @page{margin:1.5cm;size:A4}
}
@media(max-width:560px){
  .card{padding:28px 18px}
  .start-title{font-size:21px}
  .q-text{font-size:17px}
  .meta-row{flex-wrap:wrap}
  .meta-item{min-width:calc(50% - 5px)}
  .score-name{width:72px}
  .plans-grid{grid-template-columns:1fr}
  .runner-plans-grid{grid-template-columns:1fr}
}
/* interactive prompt placeholders */
.ph{background:#fef3c7;border:1.5px dashed #d97706;border-radius:5px;padding:1px 7px;cursor:text;color:#92400e;font-style:italic;display:inline-block;min-width:32px;outline:none;transition:all .15s;-webkit-user-select:text;user-select:text;}
.ph:focus{background:#fffbeb;border-style:solid;box-shadow:0 0 0 2px rgba(217,119,6,.25);color:#1a1a2e;font-style:normal;}
.ph.filled{background:#ecfdf5;border-style:solid;border-color:#10b981;color:#065f46;font-style:normal;}
/* score breakdown section */
.bd-section{border:1.5px solid #e5e7eb;border-radius:14px;margin:14px 0;overflow:hidden;}
.bd-section>summary{padding:12px 16px;font-size:13px;font-weight:800;color:#374151;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#f9fafb;list-style:none;user-select:none;}
.bd-section>summary::after{content:'▼';font-size:10px;color:#9ca3af;transition:transform .2s;margin-left:8px;flex-shrink:0;}
.bd-section[open]>summary::after{transform:rotate(180deg);}
.bd-section>summary:hover{background:#f3f4f6;}
.bd-section::-webkit-details-marker{display:none;}
.bd-body{padding:14px 16px;}
.bd-intro{font-size:12px;color:#6b7280;background:#f9fafb;border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.65;}
.bd-row{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f3f4f6;}
.bd-row:last-of-type{border-bottom:none;margin-bottom:4px;}
.bd-q{font-size:11px;color:#9ca3af;margin-bottom:2px;font-weight:700;letter-spacing:.02em;}
.bd-a{font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;}
.bd-chips{display:flex;flex-wrap:wrap;gap:5px;}
.bd-chip{font-size:11px;color:#fff;padding:2px 9px;border-radius:999px;font-weight:800;}
.bd-total{font-size:12px;background:#f9fafb;border-radius:8px;padding:10px 12px;margin-top:10px;text-align:center;}
.bd-method{font-size:11px;color:#9ca3af;margin-top:10px;line-height:1.7;border-top:1px solid #f3f4f6;padding-top:10px;}
.runner-up-hint{font-size:12px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 12px;margin-top:8px;color:#fff;text-align:center}
.feature-strip{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:10px;padding:10px 16px;margin:0 0 16px;font-size:13px;color:#166534;font-weight:600;text-align:center;line-height:1.5}
.diag-count{font-size:12px;color:#9ca3af;text-align:center;margin-bottom:14px}
.ph-notes{font-size:11px;color:#9ca3af;border-top:1px dashed #e5e7eb;margin-top:10px;padding-top:8px;line-height:1.65;}
/* html2canvas export mode — 非対応CSSを一時無効化して鮮明化 */
.export-mode,.export-mode *{animation:none!important;transition:none!important}
.export-mode .result-hero::before{display:none!important}

function getBudgetHlIdx(key,bt){

  let hi=-1;
  ts.forEach((t,i)=>{if(t<=bt&&(hi===-1||t>ts[hi]))hi=i;});

function renderUpsell(key,bt){
  if(bt<0||bt>=3)return"";
  const r=RESULTS[key];
  const ts=PLAN_TIERS[key]||[0,3];
  let upPlan=null,upTier=99;
  r.plans.forEach((p,i)=>{if(ts[i]>bt&&ts[i]<upTier){upPlan=p;upTier=ts[i];}});
  if(!upPlan)return"";
  const priceClean=upPlan.price.replace(/<[^>]*>/g,"");

</div>`;

// ── RECOMMENDED PROMPT INDEX (q1 choice × winner tool) ───────────────
function getRecPromptIdx(winnerKey, hist){
  // Copilot: show prompt matching the specific Office task
  if(winnerKey==="copilot"){
    const ot=hist.find(h=>h.qKey==="q_office_task");
    if(ot) return Math.min(ot.choiceIdx,3); // 0=Excel,1=PPT,2=Word,3=Teams
  }
  // videogen: show prompt matching the video use case
  if(winnerKey==="videogen"){
    const vp=hist.find(h=>h.qKey==="q_video_purpose");
    if(vp){const map=[1,2,2,0];return map[vp.choiceIdx]??1;} // SNS→バイラル,プロモ→製品,解説→製品(ナラティブ構造が流用可),趣味→シネマ
  }
  // imagegen: show prompt matching the image purpose
  if(winnerKey==="imagegen"){
    const ip=hist.find(h=>h.qKey==="q_image_purpose");
    if(ip){const map=[4,2,3,1];return map[ip.choiceIdx]??0;} // 日常→Instagram,仕事→ビジネスバナー,商品→EC,創作→イラスト
  }
  // gamma: show prompt matching the presentation context
  if(winnerKey==="gamma"){
    const pp=hist.find(h=>h.qKey==="q_pres_tool");
    if(pp) return 1; // プレゼン路→提案書の構成設計
    const dp=hist.find(h=>h.qKey==="q_design_purpose");
    if(dp&&dp.choiceIdx===2) return 0; // デザイン路のプレゼン→プレゼン構成
  }
  const q1h=hist.find(h=>h.qKey==="q1");
  const ci=q1h!=null?q1h.choiceIdx:0;
  // index map per tool: [文章+プレゼン, 調査, Office+PM, クリエイティブ, プライベート, コード]
  const m={
    chatgpt:    [0,3,3,1,4,0],
    claude:     [0,1,3,1,4,0],
    gemini:     [0,4,3,1,2,0],
    copilot:    [4,0,0,1,4,0],
    perplexity: [0,0,2,2,0,0],
    genspark:   [2,0,1,2,3,2],
    notebooklm: [0,2,0,4,3,0],
    imagegen:   [2,2,2,0,4,0],
    videogen:   [4,4,2,1,1,0],
    gamma:      [0,2,3,0,4,1],
    notionai:   [0,3,1,2,4,2],
    githubcopilot:[1,0,0,0,0,4],
  };
  return (m[winnerKey]||[0,0,0,0,0,0])[Math.min(ci,5)]||0;
}

async function shareWithImage(platform,btnEl,origLabel){
  if(typeof html2canvas==='undefined'){alert('画像生成機能を読み込み中です。数秒待ってからお試しください。');return;}
  const winner=getWinner();
  const r=RESULTS[winner];
  const name=r.tool.split('（')[0];
  const txt=`【AI診断結果】私に合ったAIは「${name}」${r.emoji}\n\n${r.shortPitch}\n\n#生成AI診断 #AI活用 #${name}`;
  // クリック直後に同期チェック（async前）
  let canShareFiles=false;
  try{canShareFiles=!!(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([''],'t.png',{type:'image/png'})]}));}catch(e){}
  if(!canShareFiles&&platform){
    // PC：ポップアップブロック回避のためシェアウィンドウをasync前に開く
    if(platform==='x'){
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(SITE_URL)}`,'_blank','noopener');
    }else{
      window.open(`https://line.me/R/share?text=${encodeURIComponent(buildShareText(r))}`,'_blank','noopener');
    }
    // 非同期で画像生成・ダウンロード
    if(btnEl){btnEl.textContent='⏳ 画像準備中…';btnEl.disabled=true;}
    generateCardBlob().then(({blob})=>{
      downloadBlob(blob,r);
      showToast('結果カード画像をダウンロードしました！投稿に添付してください');
    }).catch(()=>{}).finally(()=>{
      if(btnEl){btnEl.textContent=origLabel||'🖼️ 画像でシェア';btnEl.disabled=false;}
    });
    return;
  }
  // モバイル or 画像でシェアボタン：従来フロー
  if(btnEl){btnEl.textContent='⏳ 生成中…';btnEl.disabled=true;}
  try{
    const {blob}=await generateCardBlob();
    if(btnEl){btnEl.textContent=origLabel||'🖼️ 画像でシェア';btnEl.disabled=false;}
    const file=new File([blob],'AI診断結果.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({title:`私に合ったAIは「${name}」でした！`,text:`あなたも無料で診断できます → ${SITE_URL}`,url:SITE_URL,files:[file]});return;}
      catch(e){if(e.name==='AbortError')return;}
    }
    downloadBlob(blob,r);
  }catch(e){
    if(btnEl){btnEl.textContent=origLabel||'🖼️ 画像でシェア';btnEl.disabled=false;}
    alert('画像の生成に失敗しました。');
  }
}

  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

}

function getEstTotal(){
  let tot=history.length+1;
  let q=currentQ;
  for(let i=0;i<8;i++){
    if(!Qs[q])break;
    const nxt=Qs[q].choices[0]?.next;
    if(!nxt)break;
    tot++;
    q=nxt;
  }
  return tot;
}

// ── ANIMATIONS ────────────────────────────────────────────────────────
function animateBars(){
  const sorted=TOOL_KEYS.slice().sort((a,b)=>totalScores[TOOL_KEYS.indexOf(b)]-totalScores[TOOL_KEYS.indexOf(a)]);
  const maxSc=totalScores[TOOL_KEYS.indexOf(sorted[0])]||1;
  sorted.slice(0,6).forEach((k,i)=>{
    const pct=Math.round((totalScores[TOOL_KEYS.indexOf(k)]/maxSc)*100);
    const bar=document.getElementById("bar-"+k);
    const pEl=document.getElementById("pct-"+k);
    if(bar) setTimeout(()=>{bar.style.animation="none";bar.style.width="0";requestAnimationFrame(()=>{bar.style.transition="width 1s cubic-bezier(.22,1,.36,1)";bar.style.transitionDelay=i*0.1+"s";bar.style.width=pct+"%";});},50);
    if(pEl) setTimeout(()=>{pEl.textContent=pct+"%";},i*100+950);
  });
}

function exportPNG(){
  if(typeof html2canvas==="undefined"){alert("画像保存機能を読み込み中です。数秒待ってからもう一度お試しください。");return;}
  const card=document.getElementById("result-card");
  if(!card)return;
  const ignore=card.querySelectorAll("[data-html2canvas-ignore]");
  ignore.forEach(el=>el.style.display="none");
  card.classList.add('export-mode');
  // DOMに変更を反映させてからキャプチャ
  setTimeout(()=>{
    html2canvas(card,{scale:3,backgroundColor:"#ffffff",useCORS:true,allowTaint:true,logging:false,imageTimeout:15000}).then(canvas=>{
      card.classList.remove('export-mode');
      ignore.forEach(el=>el.style.display="");
      const a=document.createElement("a");
      a.download="生成AIツール診断結果.png";
      a.href=canvas.toDataURL("image/png");

      card.classList.remove('export-mode');
      ignore.forEach(el=>el.style.display="");
      alert("PNG出力に失敗しました。PDFをお試しください。");
    });
  },50);
}

function startQuiz(){phase="quiz";history=[];currentQ="q1";totalScores=new Array(12).fill(0);pendingIdxs=[];render();scrollTop();}
function selectChoice(i){
  const wasEmpty=pendingIdxs.length===0;
  if(SINGLE_SELECT_QS.includes(currentQ)){
    pendingIdxs=pendingIdxs[0]===i?[]:[i];
  }else{
    const pos=pendingIdxs.indexOf(i);
    if(pos>=0){pendingIdxs.splice(pos,1);}
    else if(pendingIdxs.length<3){pendingIdxs.push(i);}
    else{pendingIdxs.shift();pendingIdxs.push(i);}
  }
  updateChoiceUI(); // render()の代わりにDOM差分更新でフラッシュを防ぐ
  // 初回選択後は「次へ」ボタンをスクロールして見せる
  if(wasEmpty&&pendingIdxs.length>0){
    const btn=document.getElementById('btn-next');
    if(btn) btn.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}
function updateChoiceUI(){
  const isSingle=SINGLE_SELECT_QS.includes(currentQ);
  document.querySelectorAll('.choice').forEach((el,idx)=>{
    const sel=pendingIdxs.includes(idx);
    el.classList.toggle('selected',sel);
    el.setAttribute('aria-checked',String(sel));
  });
  const counter=document.querySelector('.select-counter');
  if(counter){
    counter.innerHTML=isSingle
      ?(pendingIdxs.length>0?'✓ 選択済み':'1つ選んでください')
      :(pendingIdxs.length>0?`<strong>${pendingIdxs.length}</strong> / 3 選択中`:'当てはまるものを選んでください（複数選択可・最大3つ）');
  }
  const btn=document.getElementById('btn-next');
  if(btn){
    btn.disabled=pendingIdxs.length===0;
    if(pendingIdxs.length>0){
      const nextNull=Qs[currentQ].choices[pendingIdxs[0]].next===null;
      btn.textContent=nextNull?'結果を見る 🎉':'次の質問 →';
      btn.setAttribute('aria-label',nextNull?'診断結果を表示':'次の質問へ進む');
    }else{
      btn.textContent='次の質問 →';
    }
  }
}
function goNext(){
  if(pendingIdxs.length===0)return;
  const primaryChoice=Qs[currentQ].choices[pendingIdxs[0]];
  const combined=new Array(TOOL_KEYS.length).fill(0);
  pendingIdxs.forEach(i=>Qs[currentQ].choices[i].scores.forEach((v,ti)=>combined[ti]+=v));
  combined.forEach((v,ti)=>totalScores[ti]+=v);
  history.push({qKey:currentQ,choiceIdx:pendingIdxs[0],choiceIdxs:[...pendingIdxs],addedScores:[...combined]});
  if(primaryChoice.next===null){
    phase="loading";render();scrollTop();
    setTimeout(()=>{phase="result";render();scrollTop();setTimeout(animateBars,120);},1700);
    return;
  }
  currentQ=primaryChoice.next;
  pendingIdxs=[];
  render();scrollTop();
}
function goBack(){
  if(history.length===0){phase="start";render();scrollTop();return;}
  const last=history.pop();
  last.addedScores.forEach((v,ti)=>totalScores[ti]-=v);
  currentQ=last.qKey;
  pendingIdxs=[...(last.choiceIdxs||[last.choiceIdx])];
  render();scrollTop();
}

// ── INTERACTIVE PROMPT PLACEHOLDERS ───────────────────────────────────
function makeInteractivePromptHtml(text){
  // Split "記入例" and "💡" note sections from the copyable template
  const noteIdx=text.search(/\n\n(記入例[：:]|💡)/);
  const template=noteIdx>=0?text.slice(0,noteIdx):text;
  const notes=noteIdx>=0?text.slice(noteIdx+2):'';
  const tplHtml=template.split(/(\[[^\]]+\])/g).map(part=>{
    if(/^\[[^\]]+\]$/.test(part)){
      const c=part.slice(1,-1);
      return`<span class="ph" contenteditable="true" spellcheck="false" data-ph="${escHtml(c)}" onblur="markPh(this)" onfocus="selectPh(this)">${escHtml(c)}</span>`;
    }
    return escHtml(part).replace(/\n/g,'<br>');
  }).join('');
  const notesHtml=notes?`<div class="ph-notes" data-no-copy="true">${escHtml(notes).replace(/\n/g,'<br>')}</div>`:'';
  return tplHtml+notesHtml;
}
function markPh(el){el.classList.toggle('filled',!!el.textContent.trim()&&el.textContent!==el.dataset.ph);}
function selectPh(el){try{const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}catch(e){el.focus();}}

function copyPrompt(textId,btnId){
  const el=document.getElementById(textId);
  if(!el)return;
  let text='';
  function walk(node){
    if(node.nodeType===Node.ELEMENT_NODE){
      if(node.dataset&&node.dataset.noCopy==='true')return;
      if(node.nodeName==='BR'){text+='\n';return;}
      node.childNodes.forEach(walk);
    }else if(node.nodeType===Node.TEXT_NODE){text+=node.textContent;}
  }
  walk(el);
  navigator.clipboard.writeText(text.trim()).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){const orig=btn.textContent;btn.textContent="✓ コピーしました";setTimeout(()=>{btn.textContent=orig;},2000);}
  }).catch(()=>{alert("コピーできませんでした。テキストを手動で選択してください。");});
}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
